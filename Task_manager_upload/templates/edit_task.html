{% extends "base.html" %}

{% block content %}

<h3>Edit Task</h3>

<form method="POST">

<input type="text" name="title" value="{{task[1]}}" class="form-control mb-3">

<textarea name="description" class="form-control mb-3">{{task[2]}}</textarea>

<input type="date" name="due_date" value="{{task[3]}}" class="form-control mb-3">

<select name="status" class="form-control mb-3">

<option {% if task[4]=='Pending' %}selected{% endif %}>Pending</option>
<option {% if task[4]=='In Progress' %}selected{% endif %}>In Progress</option>
<option {% if task[4]=='Completed' %}selected{% endif %}>Completed</option>

</select>

<textarea name="remarks" class="form-control mb-3">{{task[5]}}</textarea>

<button class="btn btn-primary">Update Task</button>

</form>

{% endblock %}
