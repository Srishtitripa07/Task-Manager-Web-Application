{% extends "base.html" %}

{% block content %}

<h3>Create Task</h3>

<form method="POST">

<input type="text" name="title" placeholder="Task Title" class="form-control mb-3" required>

<textarea name="description" placeholder="Task Description" class="form-control mb-3"></textarea>

<input type="date" name="due_date" class="form-control mb-3">

<select name="status" class="form-control mb-3">

<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>

</select>

<textarea name="remarks" placeholder="Task Remarks" class="form-control mb-3"></textarea>

<button class="btn btn-success">Create Task</button>

</form>

{% endblock %}
